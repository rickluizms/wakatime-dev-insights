services:
  api:
    build: .
    env_file:
      - .env
    environment:
      - RUN_SCHEDULED=false
    command: [ "uv", "run", "uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8091" ]
    restart: always

  orchestrator:
    build: .
    env_file:
      - .env
    environment:
      - RUN_SCHEDULED=true
    restart: always
